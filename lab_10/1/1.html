<!DOCTYPE html>
<html>
	<head>
		<style>
            .grid-container {
                display: grid;
                grid-template-columns: 90px 200px auto 50px;
                grid-template-rows: 80px 100px 120px;
                gap: 10px;
                background-color: #2196F3;
                padding: 10px;
            }
            .grid-container > div {
                background-color: lightgray;
                text-align: center;
                padding: 20px 0;
                font-size: 20px;
            }
		</style>
		<meta charset="utf-8">
	</head>
	<body>
		<div class="grid-container">
			<div>Ужгород</div>
			<div>Вінниця</div>
			<div>Дніпро</div>
			<div>Львів</div>
			<div>Тернопіль</div>
			<div>Хмельницький</div>
			<div>Харків</div>
			<div>Київ</div>
			<div>Тернопіль</div>
			<div>Хмельницький</div>
			<div>Харків</div>

		</div>
	</body>
</html>
